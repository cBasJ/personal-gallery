<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">MJWeb hidden identity voyage game system overview</title>
  <desc id="desc">A clean dark interface diagram showing players, Socket.IO, authoritative game state, hidden identity cards, ship systems, treasure and round flow.</desc>
  <defs>
    <linearGradient id="sea" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f2f3a"/>
      <stop offset="0.52" stop-color="#173f4a"/>
      <stop offset="1" stop-color="#1d1f2f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4c66a"/>
      <stop offset="1" stop-color="#b78b3b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#061014" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#sea)"/>
  <path d="M0 584c118-32 208-34 336-10 151 29 256 61 421 21 127-31 228-34 346-9 72 15 128 21 177 4v130H0z" fill="#e8f1ea" opacity="0.08"/>
  <path d="M0 616c138-22 276-18 414 13 104 23 207 29 309 1 145-40 259-42 396-8 64 16 114 18 161 5v93H0z" fill="#e8f1ea" opacity="0.1"/>
  <g filter="url(#shadow)">
    <rect x="86" y="78" width="1108" height="564" rx="18" fill="#f8faf8"/>
    <rect x="86" y="78" width="1108" height="82" rx="18" fill="#16232a"/>
    <text x="128" y="131" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">神秘旅途 Web 联机测试版</text>
    <text x="918" y="131" fill="#b7c6c8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">React · TypeScript · Express · Socket.IO</text>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="130" y="206" width="230" height="330" rx="14" fill="#eaf2f0" stroke="#cbdcda"/>
    <text x="158" y="248" fill="#17343a" font-size="22" font-weight="800">4-6 名玩家</text>
    <g fill="#17343a" font-size="17" font-weight="700">
      <text x="158" y="292">公开角色选择</text>
      <text x="158" y="330">隐藏身份发放</text>
      <text x="158" y="368">隐藏任务可见性</text>
      <text x="158" y="406">反应牌与行动意图</text>
    </g>
    <g fill="#1f7a75">
      <circle cx="308" cy="286" r="14"/>
      <circle cx="308" cy="324" r="14"/>
      <circle cx="308" cy="362" r="14"/>
      <circle cx="308" cy="400" r="14"/>
    </g>

    <rect x="502" y="212" width="276" height="126" rx="16" fill="#16232a"/>
    <text x="540" y="260" fill="#ffffff" font-size="24" font-weight="800">Socket.IO 房间</text>
    <text x="540" y="298" fill="#b7c6c8" font-size="17" font-weight="700">客户端只提交行动意图</text>

    <rect x="478" y="394" width="324" height="146" rx="18" fill="#ffffff" stroke="#cedad8"/>
    <text x="522" y="438" fill="#17343a" font-size="24" font-weight="800">权威 GameState</text>
    <text x="522" y="478" fill="#526266" font-size="17" font-weight="700">服务端结算身份、事件、宝藏、船体</text>
    <text x="522" y="512" fill="#526266" font-size="17" font-weight="700">回合状态统一广播给所有客户端</text>

    <rect x="920" y="206" width="228" height="330" rx="14" fill="#fff8e6" stroke="#e4cf9d"/>
    <text x="948" y="248" fill="#5a4318" font-size="22" font-weight="800">核心系统</text>
    <g fill="#5a4318" font-size="17" font-weight="700">
      <text x="948" y="292">甲板 / 引擎 / 货舱</text>
      <text x="948" y="330">真宝藏 / 伪宝藏</text>
      <text x="948" y="368">甲板对峙投票</text>
      <text x="948" y="406">事件与鬼魂阶段</text>
      <text x="948" y="444">第 10 回合最终判定</text>
    </g>
    <rect x="948" y="474" width="150" height="34" rx="17" fill="url(#gold)"/>
    <text x="972" y="497" fill="#ffffff" font-size="15" font-weight="800">v1.0 测试版</text>

    <path d="M370 304h114" stroke="#1f7a75" stroke-width="6" stroke-linecap="round"/>
    <path d="M472 290l24 14-24 14z" fill="#1f7a75"/>
    <path d="M640 348v36" stroke="#1f7a75" stroke-width="6" stroke-linecap="round"/>
    <path d="M626 374l14 24 14-24z" fill="#1f7a75"/>
    <path d="M812 464h90" stroke="#b78b3b" stroke-width="6" stroke-linecap="round"/>
    <path d="M890 450l24 14-24 14z" fill="#b78b3b"/>
  </g>
</svg>
